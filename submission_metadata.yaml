ai_usage_summary: |
  AI was used extensively as a development assistant throughout the project
  to help generate code, suggest algorithms, and explore different
  implementation approaches. I designed the overall solution, iteratively
  modified and redesigned the architecture, evaluated alternative approaches,
  integrated the components, and tested the final pipeline until it met the
  challenge requirements. All final implementation decisions were made by me,
  and I can explain and defend every part of the solution. No candidate data
  is sent to any AI model during ranking—the final pipeline runs entirely
  offline in Python with no model inference or network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic, CPU-only, network-free rule-based ranker (no embedding
  model, no GPU). Six weighted components: career-narrative concept match
  (30%, scans career_history descriptions — not just the skills list — for
  embeddings/retrieval/ranking/LLM substance), title fit (15%, also acts as
  a GATE on the skills score so a non-technical title with stuffed AI
  keywords can't outrank a real practitioner), skills fit (20%, trust-
  weighted by endorsements, duration_months, and Redrob's own
  skill_assessment_scores so unendorsed zero-duration "expert" claims are
  discounted), experience-band fit (15%, soft peak at 6-8 years), location
  (12%, Pune/Noida/Tier-1 preferred), and education (8%, low weight per the
  JD). A multiplicative behavioral-signal modifier (recency, recruiter
  response rate, interview completion, open-to-work, notice period,
  verification) scales the result. A separate integrity gate excludes
  candidates tripping >=2 independent hard-impossibility checks (job
  duration exceeding total experience, "expert" skills with ~0 duration,
  employment predating a known company's founding, malformed education
  dates) — calibrated against the provided 50-candidate sample to avoid
  false-positiving on ordinary synthetic noise. Runtime: ~85s / ~1.9GB peak
  RAM for 100K candidates on a single CPU core.

